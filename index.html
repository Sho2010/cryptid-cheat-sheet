<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cryptid ヒント否定メモ</title>
  <style>
    :root {
      --fg: #1f2328;
      --muted: #6b7280;
      --bg: #fafafa;
      --panel-bg: #ffffff;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-fg: #ffffff;
      --strike-fg: #9aa0a6;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans CJK JP", "Yu Gothic", Meiryo, sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-bg);
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    :root { --current-color: #ffffff; }
    :root[data-current-color="red"]       { --current-color: #dc2626; }
    :root[data-current-color="darkgreen"] { --current-color: #166534; }
    :root[data-current-color="purple"]    { --current-color: #7c3aed; }
    :root[data-current-color="orange"]    { --current-color: #ea580c; }
    :root[data-current-color="cyan"]      { --current-color: #0ea5e9; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 16px;
      background: var(--panel-bg);
    }
    .current-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      background: var(--panel-bg);
      font-weight: 600;
      font-size: 14px;
    }
    .current-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--current-color);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .hide-checked-toggle {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
    }
    .hide-checked-toggle input {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    :root[data-hide-checked="true"] .clue:has(input[type="checkbox"]:checked) {
      display: none;
    }
    .tab-pair {
      --player-color: #ffffff;
      display: inline-flex;
      align-items: stretch;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      background: #fff;
    }
    .tab-pair[data-color="red"]       { --player-color: #dc2626; }
    .tab-pair[data-color="darkgreen"] { --player-color: #166534; }
    .tab-pair[data-color="purple"]    { --player-color: #7c3aed; }
    .tab-pair[data-color="orange"]    { --player-color: #ea580c; }
    .tab-pair[data-color="cyan"]      { --player-color: #0ea5e9; }
    .tab-pair:has(.tab[aria-selected="true"]) {
      border-color: var(--player-color);
      box-shadow: 0 0 0 1px var(--player-color);
    }
    .tab-pair[data-color="white"]:has(.tab[aria-selected="true"]) {
      border-color: var(--fg);
      box-shadow: 0 0 0 1px var(--fg);
    }
    .swatch {
      width: 22px;
      border: 0;
      border-right: 1px solid var(--border);
      cursor: pointer;
      padding: 0;
      background: var(--player-color);
    }
    .swatch:hover { filter: brightness(0.92); }
    .tab {
      padding: 6px 14px;
      border: 0;
      background: transparent;
      color: var(--fg);
      cursor: pointer;
      font: inherit;
    }
    .tab-pair:has(.tab[aria-selected="true"]) .tab {
      font-weight: 600;
    }
    .reset {
      margin-left: auto;
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--muted);
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }
    .reset:hover { color: var(--fg); }

    main {
      padding: 16px;
      max-width: 720px;
      margin: 0 auto;
    }

    .player-panel[hidden] { display: none; }

    .clue-section {
      border: 0;
      padding: 0;
      margin: 0 0 20px 0;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .clue-section::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--current-color);
    }
    :root[data-current-color="white"] .clue-section::before {
      background: var(--border);
    }
    .clue-section legend {
      font-weight: 600;
      font-size: 14px;
      padding: 10px 14px;
      width: 100%;
      box-sizing: border-box;
      background: #f3f4f6;
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid var(--border);
    }

    .clue-list {
      list-style: none;
      margin: 0;
      padding: 6px 0;
    }
    .clue {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
    }
    .clue + .clue { border-top: 1px solid #f3f4f6; }
    .clue input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .clue label {
      cursor: pointer;
      flex: 1;
    }
    .clue:has(input[type="checkbox"]:checked) label {
      text-decoration: line-through;
      color: var(--strike-fg);
    }

    @media (max-width: 480px) {
      header h1 { font-size: 16px; }
      .tabs { padding: 8px 10px; }
      .tab { padding: 5px 10px; font-size: 13px; }
      .swatch { width: 18px; }
      main { padding: 10px; }
      .clue { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <header><h1>Cryptid ヒント否定メモ</h1></header>

  <div class="topbar">
    <nav class="tabs" role="tablist">
      <span class="tab-pair" data-player="1" data-color="white">
        <button class="swatch" type="button" data-player="1" aria-label="相手1の色を変更"></button>
        <button class="tab" type="button" data-player="1" aria-selected="true">相手1</button>
      </span>
      <span class="tab-pair" data-player="2" data-color="white">
        <button class="swatch" type="button" data-player="2" aria-label="相手2の色を変更"></button>
        <button class="tab" type="button" data-player="2" aria-selected="false">相手2</button>
      </span>
      <span class="tab-pair" data-player="3" data-color="white">
        <button class="swatch" type="button" data-player="3" aria-label="相手3の色を変更"></button>
        <button class="tab" type="button" data-player="3" aria-selected="false">相手3</button>
      </span>
      <span class="tab-pair" data-player="4" data-color="white">
        <button class="swatch" type="button" data-player="4" aria-label="相手4の色を変更"></button>
        <button class="tab" type="button" data-player="4" aria-selected="false">相手4</button>
      </span>
      <button class="reset" type="button">この相手をリセット</button>
    </nav>
    <div class="current-indicator" aria-live="polite">
      <span class="current-dot"></span>
      <span><span class="current-label">相手1</span> のヒント</span>
      <label class="hide-checked-toggle">
        <input type="checkbox" id="hide-checked">
        チェック済みを隠す
      </label>
    </div>
  </div>

  <main></main>

  <script>
    'use strict';

    const STORAGE_KEY = 'cryptid-cheat-sheet';
    const PLAYER_COUNT = 4;
    const COLOR_CYCLE = ['white', 'red', 'darkgreen', 'purple', 'orange', 'cyan'];
    const VALID_COLORS = new Set(COLOR_CYCLE);

    const CLUE_BOOK = [
      { id: 'terrain', label: '地形(2種類のどちらか)', clues: [
        { id: 'forest_desert',   label: '森または砂漠' },
        { id: 'forest_water',    label: '森または水辺' },
        { id: 'forest_swamp',    label: '森または沼' },
        { id: 'forest_mountain', label: '森または山' },
        { id: 'desert_water',    label: '砂漠または水辺' },
        { id: 'desert_swamp',    label: '砂漠または沼' },
        { id: 'desert_mountain', label: '砂漠または山' },
        { id: 'water_swamp',     label: '水辺または沼' },
        { id: 'water_mountain',  label: '水辺または山' },
        { id: 'swamp_mountain',  label: '沼または山' },
      ]},
      { id: 'within_terrain', label: '1マス以内に特定地形', clues: [
        { id: 'within1_forest',   label: '森から1マス以内' },
        { id: 'within1_desert',   label: '砂漠から1マス以内' },
        { id: 'within1_swamp',    label: '沼から1マス以内' },
        { id: 'within1_mountain', label: '山から1マス以内' },
        { id: 'within1_water',    label: '水辺から1マス以内' },
      ]},
      { id: 'animal', label: '動物の縄張り', clues: [
        { id: 'within1_any_animal', label: 'いずれかの動物の縄張りから1マス以内' },
        { id: 'within2_cougar',     label: 'ワシの縄張りから2マス以内' },
        { id: 'within2_bear',       label: 'クマの縄張りから2マス以内' },
      ]},
      { id: 'structure', label: '建造物', clues: [
        { id: 'within2_abandoned_shack', label: '廃墟から2マス以内' },
        { id: 'within2_standing_stone',  label: '巨石から2マス以内' },
      ]},
      { id: 'color', label: '建造物の色', clues: [
        { id: 'within3_blue',  label: '青色の建造物から3マス以内' },
        { id: 'within3_white', label: '白色の建造物から3マス以内' },
        { id: 'within3_green', label: '緑色の建造物から3マス以内' },
        { id: 'within3_black', label: '黒色の建造物から3マス以内' },
      ]},
    ];

    const main = document.querySelector('main');
    const tabsEl = document.querySelector('.tabs');
    const resetBtn = document.querySelector('.reset');
    const hideCheckedEl = document.querySelector('#hide-checked');

    function buildDom() {
      const frag = document.createDocumentFragment();
      for (let p = 1; p <= PLAYER_COUNT; p++) {
        const panel = document.createElement('section');
        panel.className = 'player-panel';
        panel.dataset.player = String(p);
        if (p !== 1) panel.hidden = true;

        for (const section of CLUE_BOOK) {
          const fs = document.createElement('fieldset');
          fs.className = 'clue-section';
          fs.dataset.section = section.id;

          const legend = document.createElement('legend');
          legend.textContent = section.label;
          fs.appendChild(legend);

          const ul = document.createElement('ul');
          ul.className = 'clue-list';

          for (const clue of section.clues) {
            const li = document.createElement('li');
            li.className = 'clue';

            const input = document.createElement('input');
            input.type = 'checkbox';
            input.id = `p${p}-${clue.id}`;
            input.dataset.player = String(p);
            input.dataset.clueId = clue.id;

            const label = document.createElement('label');
            label.htmlFor = input.id;
            label.textContent = clue.label;

            li.appendChild(input);
            li.appendChild(label);
            ul.appendChild(li);
          }
          fs.appendChild(ul);
          panel.appendChild(fs);
        }
        frag.appendChild(panel);
      }
      main.appendChild(frag);
    }

    function emptyState() {
      const players = {};
      const playerColors = {};
      for (let p = 1; p <= PLAYER_COUNT; p++) {
        players[p] = [];
        playerColors[p] = 'white';
      }
      return { activePlayer: 1, players, playerColors, hideChecked: false };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return emptyState();
        const parsed = JSON.parse(raw);
        const state = emptyState();
        if (parsed && typeof parsed === 'object') {
          if (Number.isInteger(parsed.activePlayer)
              && parsed.activePlayer >= 1
              && parsed.activePlayer <= PLAYER_COUNT) {
            state.activePlayer = parsed.activePlayer;
          }
          if (parsed.players && typeof parsed.players === 'object') {
            for (let p = 1; p <= PLAYER_COUNT; p++) {
              const arr = parsed.players[p];
              if (Array.isArray(arr)) {
                state.players[p] = arr.filter(x => typeof x === 'string');
              }
            }
          }
          if (parsed.playerColors && typeof parsed.playerColors === 'object') {
            for (let p = 1; p <= PLAYER_COUNT; p++) {
              const c = parsed.playerColors[p];
              if (typeof c === 'string' && VALID_COLORS.has(c)) {
                state.playerColors[p] = c;
              }
            }
          }
          if (typeof parsed.hideChecked === 'boolean') {
            state.hideChecked = parsed.hideChecked;
          }
        }
        return state;
      } catch {
        return emptyState();
      }
    }

    function readCurrentState() {
      const state = emptyState();
      const activeTab = tabsEl.querySelector('.tab[aria-selected="true"]');
      state.activePlayer = activeTab ? Number(activeTab.dataset.player) : 1;
      const inputs = main.querySelectorAll('input[type="checkbox"]');
      for (const input of inputs) {
        if (input.checked) {
          const p = input.dataset.player;
          state.players[p].push(input.dataset.clueId);
        }
      }
      for (const pair of tabsEl.querySelectorAll('.tab-pair')) {
        const p = pair.dataset.player;
        const c = pair.dataset.color;
        if (VALID_COLORS.has(c)) state.playerColors[p] = c;
      }
      state.hideChecked = hideCheckedEl.checked;
      return state;
    }

    function saveState() {
      const state = readCurrentState();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function applyState(state) {
      const inputs = main.querySelectorAll('input[type="checkbox"]');
      for (const input of inputs) {
        const checked = state.players[input.dataset.player]?.includes(input.dataset.clueId) ?? false;
        input.checked = checked;
      }
      for (const pair of tabsEl.querySelectorAll('.tab-pair')) {
        const p = pair.dataset.player;
        pair.dataset.color = state.playerColors[p] ?? 'white';
      }
      hideCheckedEl.checked = !!state.hideChecked;
      document.documentElement.dataset.hideChecked = String(!!state.hideChecked);
      activateTab(state.activePlayer, { save: false });
    }

    function cycleColor(playerIdx) {
      const pair = tabsEl.querySelector(`.tab-pair[data-player="${playerIdx}"]`);
      if (!pair) return;
      const taken = new Set();
      for (const other of tabsEl.querySelectorAll('.tab-pair')) {
        if (other === pair) continue;
        if (other.dataset.color !== 'white') taken.add(other.dataset.color);
      }
      const startIdx = COLOR_CYCLE.indexOf(pair.dataset.color);
      for (let i = 1; i <= COLOR_CYCLE.length; i++) {
        const candidate = COLOR_CYCLE[(startIdx + i) % COLOR_CYCLE.length];
        if (candidate === 'white' || !taken.has(candidate)) {
          pair.dataset.color = candidate;
          break;
        }
      }
      syncCurrent();
      saveState();
    }

    function activateTab(playerIdx, opts = { save: true }) {
      const tabs = tabsEl.querySelectorAll('.tab');
      tabs.forEach(t => {
        t.setAttribute('aria-selected', t.dataset.player === String(playerIdx) ? 'true' : 'false');
      });
      const panels = main.querySelectorAll('.player-panel');
      panels.forEach(panel => {
        panel.hidden = panel.dataset.player !== String(playerIdx);
      });
      syncCurrent();
      if (opts.save) saveState();
    }

    function syncCurrent() {
      const activeTab = tabsEl.querySelector('.tab[aria-selected="true"]');
      const playerIdx = activeTab?.dataset.player ?? '1';
      const pair = tabsEl.querySelector(`.tab-pair[data-player="${playerIdx}"]`);
      document.documentElement.dataset.currentColor = pair?.dataset.color ?? 'white';
      const labelEl = document.querySelector('.current-label');
      if (labelEl) labelEl.textContent = `相手${playerIdx}`;
    }

    function resetCurrentPlayer() {
      const activeTab = tabsEl.querySelector('.tab[aria-selected="true"]');
      const playerIdx = activeTab ? activeTab.dataset.player : '1';
      const panel = main.querySelector(`.player-panel[data-player="${playerIdx}"]`);
      if (!panel) return;
      panel.querySelectorAll('input[type="checkbox"]').forEach(i => { i.checked = false; });
      saveState();
    }

    function init() {
      buildDom();
      applyState(loadState());

      main.addEventListener('change', e => {
        if (e.target instanceof HTMLInputElement && e.target.type === 'checkbox') {
          saveState();
        }
      });

      tabsEl.addEventListener('click', e => {
        const swatch = e.target.closest('.swatch');
        if (swatch) {
          cycleColor(swatch.dataset.player);
          return;
        }
        const tab = e.target.closest('.tab');
        if (tab) {
          activateTab(Number(tab.dataset.player));
        }
      });

      resetBtn.addEventListener('click', resetCurrentPlayer);

      hideCheckedEl.addEventListener('change', () => {
        document.documentElement.dataset.hideChecked = String(hideCheckedEl.checked);
        saveState();
      });
    }

    init();
  </script>
</body>
</html>
